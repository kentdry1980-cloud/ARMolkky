<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由選択 ARサイズチェッカー</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: #f5f5f5;
        }
        /* コントロールパネルのスタイル */
        #ui-container {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            text-align: center;
            width: 80%;
            max-width: 400px;
        }
        #file-input {
            display: none; /* 標準のボタンは隠す */
        }
        .custom-button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 8px;
        }
        #file-name {
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }
        /* AR表示エリア */
        model-viewer {
            width: 100vw;
            height: 100vh;
        }
        /* AR起動ボタン */
        #ar-button {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 32px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            cursor: pointer;
            display: none; /* 最初は非表示（ファイル選択後に表示） */
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <label for="file-input" class="custom-button">📂 GLBファイルを選択</label>
        <input type="file" id="file-input" accept=".glb">
        <div id="file-name">ファイルが選択されていません</div>
    </div>

    <model-viewer 
    id="viewer"
    ar 
    ar-modes="webxr" 
    camera-controls 
    touch-action="none" 
    alt="選択された3Dモデル">
        
        <button slot="ar-button" id="ar-button">
            📦 目の前に設置する (AR)
        </button>
    </model-viewer>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileNameDiv = document.getElementById('file-name');
        const viewer = document.getElementById('viewer');
        const arButton = document.getElementById('ar-button');

        // ファイルが選択されたときの処理
        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            
            if (file) {
                // 選択されたファイル名を表示
                fileNameDiv.textContent = file.name;

                // スマホ内のファイルをブラウザが一時的に読み込むためのURLを生成
                const blobUrl = URL.createObjectURL(file);
                
                // model-viewerにURLをセットして3Dモデルを表示
                viewer.src = blobUrl;

                // AR起動ボタンを表示
                arButton.style.display = 'block';
            }
        });
    </script>
</body>
</html>
