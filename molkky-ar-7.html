<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>モルックAR テスト</title>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    width: 100%; height: 100%;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: #111;
  }
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%;
    z-index: 10; pointer-events: none;
    display: flex; flex-direction: column; align-items: center;
  }
  #status {
    margin-top: 16px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    text-align: center;
    max-width: 90%;
  }
  #lastThrow {
    margin-top: 6px;
    background: rgba(0,0,0,0.5);
    color: #9fffb0;
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 13px;
    min-height: 18px;
  }
  #startBtn {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 20;
    background: #1a1a2e;
    color: #fff;
    border: none;
    font-size: 18px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  #startBtn button {
    margin-top: 20px;
    padding: 14px 32px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: #4CAF50;
    color: white;
    pointer-events: auto;
  }
  #resetBtn {
    position: fixed; bottom: 24px; right: 16px;
    z-index: 15;
    padding: 10px 18px;
    border-radius: 20px;
    border: none;
    background: rgba(255,80,80,0.85);
    color: white;
    font-size: 14px;
    pointer-events: auto;
  }
  #unsupported {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: 10px;
    max-width: 80%;
    text-align: center;
  }
  #playerBoard {
    margin-top: 10px;
    display: flex;
    gap: 8px;
  }
  .playerCard {
    background: rgba(0,0,0,0.55);
    border-radius: 14px;
    padding: 6px 14px;
    text-align: center;
    min-width: 84px;
    border: 2px solid transparent;
  }
  .playerCard.active {
    border-color: #4CAF50;
    background: rgba(76,175,80,0.25);
  }
  .playerCard .pname {
    font-size: 12px;
    color: #ccc;
  }
  .playerCard .pscore {
    font-size: 20px;
    font-weight: bold;
    color: #fff;
  }
  #turnBanner {
    margin-top: 8px;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.5);
    color: #ffd700;
    padding: 6px 16px;
    border-radius: 16px;
    font-size: 14px;
    text-align: center;
    display: none;
  }
  #nextTurnBtn {
    margin-top: 10px;
    padding: 10px 24px;
    border-radius: 24px;
    border: none;
    background: #4CAF50;
    color: white;
    font-size: 15px;
    font-weight: bold;
    pointer-events: auto;
    display: none;
  }
  #angleControl {
    position: fixed;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 12;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: auto;
  }
  #angleControl .angleLabel {
    background: rgba(0,0,0,0.6);
    color: #ffd700;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 10px;
    margin-bottom: 6px;
    white-space: nowrap;
  }
  #angleSlider {
    writing-mode: vertical-lr;
    direction: rtl;
    width: 36px;
    height: 180px;
    accent-color: #4CAF50;
  }
  #angleControl .angleHint {
    background: rgba(0,0,0,0.6);
    color: #ccc;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 8px;
    margin-top: 6px;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="startBtn">
  <div>モルックAR テスト</div>
  <div style="font-size:13px; opacity:0.7; margin-top:6px;">対応端末: Android Chrome (WebXR対応)</div>
  <button id="enterAR">ARを開始</button>
  <div id="unsupported"></div>
</div>

<div id="overlay">
  <div id="status">床をタップ：その場所が立ち位置になり、2m先にピンが並びます</div>
  <div id="playerBoard">
    <div class="playerCard active" id="p1Card">
      <div class="pname">プレイヤー1</div>
      <div class="pscore" id="p1Score">0</div>
    </div>
    <div class="playerCard" id="p2Card">
      <div class="pname">プレイヤー2</div>
      <div class="pscore" id="p2Score">0</div>
    </div>
  </div>
  <div id="lastThrow"></div>
  <div id="turnBanner"></div>
  <button id="nextTurnBtn">次のターンへ</button>
</div>

<button id="resetBtn" style="display:none;">リセット</button>

<div id="angleControl" style="display:none;">
  <div class="angleLabel" id="angleValueLabel">仰角 20°</div>
  <input type="range" id="angleSlider" min="0" max="60" value="20" step="1">
  <div class="angleHint">上下にスライド<br>で角度調整</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';

// ---------- 基本セットアップ ----------
let camera, scene, renderer;
let reticle; // 床検出用の照準
let throwGuideLine; // 投擲方向・仰角のガイドライン
let throwGuideTarget; // 着弾予測マーカー
const GUIDE_POINTS = 24; // ガイドラインの分割数
let hitTestSource = null;
let hitTestSourceRequested = false;

let pinsPlaced = false;
const pins = [];
const PIN_COUNT = 12;
const sticks = []; // フィールドに存在する棒（消えずに残り続ける）

let floorY = null; // 床のワールドY座標（バウンド判定基準）
let throwMarker = null; // 投擲位置（モルッカーリ）を示すマーカー
let throwSpot = null; // {position, quaternion} 立ち位置の記録

// ---- 対戦状態 ----
const players = [
  { name: 'プレイヤー1', score: 0 },
  { name: 'プレイヤー2', score: 0 },
];
let currentPlayerIndex = 0;
let gameOver = false;
let waitingForNextTurn = false; // スコア確認中（次のターンボタン待ち）

const statusEl = document.getElementById('status');
const lastThrowEl = document.getElementById('lastThrow');
const resetBtn = document.getElementById('resetBtn');
const turnBannerEl = document.getElementById('turnBanner');
const nextTurnBtn = document.getElementById('nextTurnBtn');
const p1ScoreEl = document.getElementById('p1Score');
const p2ScoreEl = document.getElementById('p2Score');
const p1CardEl = document.getElementById('p1Card');
const p2CardEl = document.getElementById('p2Card');
const angleControlEl = document.getElementById('angleControl');
const angleSliderEl = document.getElementById('angleSlider');
const angleValueLabelEl = document.getElementById('angleValueLabel');

let throwAngleDeg = 20; // 仰角(度)。スライダーで調整。0=水平、大きいほど山なり

angleSliderEl.addEventListener('input', () => {
  throwAngleDeg = Number(angleSliderEl.value);
  angleValueLabelEl.textContent = `仰角 ${throwAngleDeg}°`;
});

init();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

  const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
  light.position.set(0.5, 1, 0.25);
  scene.add(light);
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(0, 3, 1);
  scene.add(dirLight);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // 床検出の照準（リング）
  reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.08, 0.1, 32).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
  );
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);

  // 投げる方向・仰角のガイドライン（放物線の目安）
  const guideGeo = new THREE.BufferGeometry();
  const guidePositions = new Float32Array(GUIDE_POINTS * 3);
  guideGeo.setAttribute('position', new THREE.BufferAttribute(guidePositions, 3));
  const guideMat = new THREE.LineBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.85, linewidth: 2 });
  throwGuideLine = new THREE.Line(guideGeo, guideMat);
  throwGuideLine.visible = false;
  throwGuideLine.frustumCulled = false;
  scene.add(throwGuideLine);

  // 着弾予測地点のマーカー
  throwGuideTarget = new THREE.Mesh(
    new THREE.RingGeometry(0.04, 0.055, 24).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.9, side: THREE.DoubleSide })
  );
  throwGuideTarget.visible = false;
  scene.add(throwGuideTarget);

  // ---- ARボタン設定 ----
  const sessionInit = {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: document.body }
  };

  document.getElementById('enterAR').addEventListener('click', () => {
    if (!navigator.xr) {
      document.getElementById('unsupported').textContent =
        'このブラウザはWebXRに対応していません。Android Chromeでお試しください。';
      return;
    }
    navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
      if (!supported) {
        document.getElementById('unsupported').textContent =
          'この端末はARモードに対応していません。';
        return;
      }
      const arButton = ARButton.createButton(renderer, sessionInit);
      arButton.style.display = 'none';
      document.body.appendChild(arButton);
      arButton.click();
      document.getElementById('startBtn').style.display = 'none';
      resetBtn.style.display = 'block';
    });
  });

  renderer.xr.addEventListener('sessionstart', onSessionStart);
  renderer.xr.addEventListener('sessionend', onSessionEnd);

  window.addEventListener('resize', onWindowResize);

  resetBtn.addEventListener('click', resetGame);

  // タップでピン配置
  const controller = renderer.xr.getController(0);
  controller.addEventListener('select', onSelect);
  scene.add(controller);

  renderer.setAnimationLoop(render);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onSessionStart() {
  statusEl.textContent = '床にカメラを向けてタップ → ピンを配置';
  setupMotionListener();
}

function onSessionEnd() {
  resetBtn.style.display = 'none';
  document.getElementById('startBtn').style.display = 'flex';
}

// ---------- ピン配置 ----------
function onSelect() {
  if (pinsPlaced) return;
  if (reticle.visible) {
    placePins(reticle.matrix);
  }
}

function placePins(matrix) {
  const standPos = new THREE.Vector3();
  const standQuat = new THREE.Quaternion(); // 床面の傾き（向きはカメラ基準を優先するため未使用）
  const scale = new THREE.Vector3();
  matrix.decompose(standPos, standQuat, scale);

  floorY = standPos.y; // バウンド判定の基準となる床の高さ

  // ---- タップ地点 = プレイヤーの立ち位置（投擲ライン）----
  // ピンはそこからカメラが向いている水平方向に2m先へ配置する
  const camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);
  camDir.y = 0;
  if (camDir.lengthSq() < 0.0001) camDir.set(0, 0, -1); // ほぼ真上/真下を向いていた場合の保険
  camDir.normalize();

  const PIN_DISTANCE = 2.0; // 立ち位置からピン中心列までの距離(メートル)
  const pos = standPos.clone().add(camDir.clone().multiplyScalar(PIN_DISTANCE));

  // ピン配置の向き = カメラが向いていた水平方向に合わせる
  const quat = new THREE.Quaternion().setFromUnitVectors(
    new THREE.Vector3(0, 0, -1), camDir
  );

  // 公式モルック配列
  // 最前列(プレイヤーに近い側): 1, 2
  // 2列目: 3, 4
  // 3列目: 5, 11, 12, 6
  // 最後列(奥): 7, 8, 9
  // z軸マイナス方向 = カメラ/プレイヤーから奥へ向かう方向として配置
  const spacing = 0.075; // ピン間隔(メートル)
  const rowDepth = 0.08; // 列同士の奥行き間隔

  const layout = [
    // [番号, x(横), row(奥行きインデックス)]
    { num: 1,  x: -0.5 * spacing, row: 0 },
    { num: 2,  x:  0.5 * spacing, row: 0 },

    { num: 3,  x: -0.5 * spacing, row: 1 },
    { num: 4,  x:  0.5 * spacing, row: 1 },

    { num: 5,  x: -1.5 * spacing, row: 2 },
    { num: 11, x: -0.5 * spacing, row: 2 },
    { num: 12, x:  0.5 * spacing, row: 2 },
    { num: 6,  x:  1.5 * spacing, row: 2 },

    { num: 7,  x: -1.0 * spacing, row: 3 },
    { num: 8,  x:  0.0,           row: 3 },
    { num: 9,  x:  1.0 * spacing, row: 3 },

    // 10番は最後列の中央奥(やや高得点ピンとして中心寄りに置く慣習もあるが
    // 公式の基本配置に準拠し最終列に追加)
    { num: 10, x: 0.0, row: 4 },
  ];

  layout.forEach((p) => {
    const pin = createPinMesh(p.num);
    const localPos = new THREE.Vector3(p.x, 0, -p.row * rowDepth);
    localPos.applyQuaternion(quat);
    localPos.add(pos);
    pin.position.copy(localPos);
    pin.quaternion.copy(quat);
    pin.userData.basePosition = localPos.clone();
    pin.userData.baseQuaternion = quat.clone();
    pin.userData.knocked = false;
    pin.userData.number = p.num;
    scene.add(pin);
    pins.push(pin);
  });

  // 投擲ライン(モルッカーリ)はタップした地点＝プレイヤーの立ち位置そのもの
  throwSpot = { position: standPos.clone(), quaternion: quat.clone() };
  createThrowMarker(standPos, quat);

  pinsPlaced = true;
  reticle.visible = false;
  beginTurn();
}

function createThrowMarker(pos, quat) {
  if (throwMarker) scene.remove(throwMarker);
  const group = new THREE.Group();

  const ringGeo = new THREE.RingGeometry(0.12, 0.15, 32).rotateX(-Math.PI / 2);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  group.add(ring);

  // 足跡風の印（左右2つの小さい丸）
  const footGeo = new THREE.CircleGeometry(0.025, 16).rotateX(-Math.PI / 2);
  const footMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
  const footL = new THREE.Mesh(footGeo, footMat);
  footL.position.set(-0.05, 0.001, 0);
  group.add(footL);
  const footR = new THREE.Mesh(footGeo, footMat);
  footR.position.set(0.05, 0.001, 0);
  group.add(footR);

  group.position.copy(pos);
  group.quaternion.copy(quat);
  scene.add(group);
  throwMarker = group;
}

function createNumberTexture(num) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#f5ecd7';
  ctx.fillRect(0, 0, 128, 128);
  ctx.strokeStyle = '#8a5a2b';
  ctx.lineWidth = 6;
  ctx.strokeRect(3, 3, 122, 122);
  ctx.fillStyle = '#1a1a1a';
  ctx.font = 'bold 64px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(num), 64, 68);
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  return tex;
}

function createPinMesh(number) {
  const group = new THREE.Group();

  // 胴体(円柱)
  const bodyHeight = 0.12;
  const bodyGeo = new THREE.CylinderGeometry(0.018, 0.022, bodyHeight, 16, 1, true);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe8d9b5 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = bodyHeight / 2;
  group.add(body);

  // 頭部: 45度カットの切断面を表現する円錐台を斜めに使う
  // シンプルに「上面を45度傾けた円柱」を頭部として配置し、
  // その傾いた面に数字テクスチャを貼る
  const headRadius = 0.022;
  const headThickness = 0.03;
  const headGeo = new THREE.CylinderGeometry(headRadius, headRadius, headThickness, 16);

  const numberTex = createNumberTexture(number);
  const sideMat = new THREE.MeshStandardMaterial({ color: 0xe8d9b5 });
  const topMat = new THREE.MeshStandardMaterial({ map: numberTex });
  const bottomMat = new THREE.MeshStandardMaterial({ color: 0xe8d9b5 });
  // CylinderGeometryのマテリアル順: [側面, 上面, 底面]
  const head = new THREE.Mesh(headGeo, [sideMat, topMat, bottomMat]);
  head.position.y = bodyHeight + (headThickness / 2) * Math.cos(Math.PI / 4);
  head.rotation.x = Math.PI / 4; // 45度傾ける → 切断面が斜め上向きになる
  group.add(head);

  group.userData.headTopDirection = new THREE.Vector3(0, Math.cos(Math.PI/4), Math.sin(Math.PI/4));

  return group;
}

// ---------- フリックで棒を投げる ----------
let lastThrowTime = 0;
const THROW_COOLDOWN = 700; // ms

// フリック判定のパラメータ
const MIN_FLICK_DISTANCE = 30;   // px、これより短いスワイプは無視
const MIN_FLICK_SPEED = 0.3;     // px/ms、これより遅いスワイプは無視
const MAX_FLICK_SPEED = 3.5;     // px/ms、これ以上は最大威力として頭打ち

function setupMotionListener() {
  let touchStartX = 0;
  let touchStartY = 0;
  let touchStartTime = 0;
  let tracking = false;

  function onTouchStart(e) {
    // ボタンや仰角スライダーなどUI操作と衝突しないよう、ARのcanvas上のタッチのみ拾う
    if (e.target.closest('button, #angleControl')) return;
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    touchStartTime = performance.now();
    tracking = true;
  }

  function onTouchEnd(e) {
    if (!tracking) return;
    tracking = false;
    if (e.target.closest('button, #angleControl')) return;

    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY; // 画面下方向がプラス
    const dt = Math.max(performance.now() - touchStartTime, 1);

    const distance = Math.hypot(dx, dy);
    const speed = distance / dt; // px/ms

    // 上方向(dyがマイナス)へのフリックのみ「投げる」動作として扱う
    const isUpwardFlick = dy < -15;

    if (!isUpwardFlick) return;
    if (distance < MIN_FLICK_DISTANCE || speed < MIN_FLICK_SPEED) return;

    const now = performance.now();
    if (!pinsPlaced || gameOver || waitingForNextTurn) return;
    if (now - lastThrowTime < THROW_COOLDOWN) return;
    lastThrowTime = now;

    // 速さ → 威力(0~1.5)にマッピング
    const clampedSpeed = Math.min(speed, MAX_FLICK_SPEED);
    const power = ((clampedSpeed - MIN_FLICK_SPEED) / (MAX_FLICK_SPEED - MIN_FLICK_SPEED)) * 1.5;

    // 左右のブレ → 投げる方向の横ズレ角度(ラジアン)に変換（最大±20度程度）
    const maxSidewaysAngle = Math.PI / 9; // 20度
    const sidewaysRatio = THREE.MathUtils.clamp(dx / 150, -1, 1);
    const aimOffsetAngle = sidewaysRatio * maxSidewaysAngle;

    throwStick(Math.max(power, 0.1), aimOffsetAngle);
  }

  window.addEventListener('touchstart', onTouchStart, { passive: true });
  window.addEventListener('touchend', onTouchEnd, { passive: true });
}

// カメラの水平方向(Y軸回転のみ) + 仰角スライダー + フリックの横ズレ から
// 実際に投げる方向ベクトルを計算する（throwStickとガイドライン表示の両方で使う共通ロジック）
function computeThrowDirection(aimOffsetAngle = 0) {
  const camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);
  camDir.y = 0;
  if (camDir.lengthSq() < 0.0001) camDir.set(0, 0, -1);
  camDir.normalize();
  camDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), aimOffsetAngle);

  // 仰角(throwAngleDeg)ぶん上向きに傾ける
  const angleRad = THREE.MathUtils.degToRad(throwAngleDeg);
  const horizontalLen = Math.cos(angleRad);
  const dir = new THREE.Vector3(
    camDir.x * horizontalLen,
    Math.sin(angleRad),
    camDir.z * horizontalLen
  );
  return dir.normalize();
}

// 中くらいの威力(power=0.75)で投げたと仮定した場合の放物線を計算してガイドラインに反映する
const GUIDE_REFERENCE_POWER = 0.75;
const GUIDE_GRAVITY = -3.2; // throwStickの重力と一致させる
const GUIDE_TIME_STEP = 0.06;

function updateThrowGuide() {
  if (!pinsPlaced || gameOver || waitingForNextTurn || floorY === null) {
    throwGuideLine.visible = false;
    throwGuideTarget.visible = false;
    return;
  }

  const camPos = new THREE.Vector3();
  camera.getWorldPosition(camPos);
  const dir = computeThrowDirection(0);
  const speed = 1.0 + GUIDE_REFERENCE_POWER * 1.0; // throwStickの初速計算式と一致させる
  const startPos = camPos.clone().add(dir.clone().multiplyScalar(0.35));
  const vel = dir.clone().multiplyScalar(speed);

  const positions = throwGuideLine.geometry.attributes.position.array;
  const p = startPos.clone();
  const v = vel.clone();
  let landed = false;
  let landingPoint = null;

  for (let i = 0; i < GUIDE_POINTS; i++) {
    positions[i * 3] = p.x;
    positions[i * 3 + 1] = p.y;
    positions[i * 3 + 2] = p.z;

    if (!landed) {
      v.y += GUIDE_GRAVITY * GUIDE_TIME_STEP;
      p.addScaledVector(v, GUIDE_TIME_STEP);
      if (p.y <= floorY) {
        p.y = floorY;
        landed = true;
        landingPoint = p.clone();
      }
    }
  }

  throwGuideLine.geometry.attributes.position.needsUpdate = true;
  throwGuideLine.visible = true;

  if (landingPoint) {
    throwGuideTarget.position.copy(landingPoint);
    throwGuideTarget.position.y += 0.002;
    throwGuideTarget.visible = true;
  } else {
    throwGuideTarget.visible = false;
  }
}

function throwStick(power, aimOffsetAngle = 0) {
  // モルックの投擲棒: 直径3cm程度、長さ20cm程度の木製円柱
  const stickGeo = new THREE.CylinderGeometry(0.016, 0.016, 0.2, 12);
  const stickMat = new THREE.MeshStandardMaterial({
    color: 0xb5803c,
    roughness: 0.8,
  });
  const stick = new THREE.Mesh(stickGeo, stickMat);

  const camPos = new THREE.Vector3();
  camera.getWorldPosition(camPos);
  const throwDir = computeThrowDirection(aimOffsetAngle);

  stick.position.copy(camPos).add(throwDir.clone().multiplyScalar(0.35));
  // 見た目の向き: 進行方向(仰角込み)を向かせる
  const lookTarget = stick.position.clone().add(throwDir);
  stick.lookAt(lookTarget);
  stick.rotateX(Math.PI / 2); // 円柱を進行方向に横向きに

  const speed = 1.0 + power * 1.0; // 強弱を初速に反映（0.1なら約1.1m/s、最大1.5なら約2.5m/s）
  const velocity = throwDir.clone().multiplyScalar(speed);

  stick.userData.velocity = velocity;
  stick.userData.gravity = -3.2;
  stick.userData.spinAxis = new THREE.Vector3(1, 0.2, 0).normalize();
  stick.userData.spinSpeed = 8 + power * 6; // ラジアン/秒
  stick.userData.groundOffset = 0.016; // 棒の半径分、床から浮かせる

  // ---- 物理状態管理 ----
  stick.userData.bounceCount = 0;
  stick.userData.settled = false; // 地面で静止したら true（以後は当たり判定もしない）
  stick.userData.scored = false; // このスローで採点済みか
  stick.userData.knockedThisThrow = [];
  stick.userData.airborneTime = 0; // 投げてからの経過時間
  stick.userData.restTimer = 0; // 静止判定用タイマー

  scene.add(stick);
  sticks.push(stick);

  statusEl.textContent = `投げた！ 強さ: ${(power * 100 / 1.5).toFixed(0)}%`;
}

// ---------- シンプルな物理: バウンド・転がり・衝突判定 ----------
const PIN_RADIUS = 0.03;
const PIN_BODY_RADIUS = 0.02; // ピン胴体のおおよその半径（横たわった時の地面からの高さに使う）
const KNOCK_SPEED_THRESHOLD = 0.4; // この速さ以上の衝突で倒れる
const RESTITUTION = 0.22; // バウンド時の反発係数（木材同士の硬い衝突＋すぐ減衰するイメージ）
const GROUND_FRICTION = 0.8; // 着地後、水平速度に毎フレームかかる摩擦係数
const STOP_SPEED = 0.05; // これ未満の速度になったら静止とみなす
const MAX_BOUNCES = 3; // これ以上バウンドしたら強制的に静止させる（木材なので早めに収束）

// 木の棒/ピンが地面でバウンドしながら転がり、最終的に静止するまでの汎用物理ステップ。
// obj.userData に velocity, gravity, spinAxis, spinSpeed, bounceCount, restTimer, groundOffset が必要。
// 戻り値: このフレームで静止したら true
function applyBouncePhysics(obj, dt, floorLevel) {
  const u = obj.userData;
  u.velocity.y += u.gravity * dt;
  obj.position.addScaledVector(u.velocity, dt);
  obj.rotateOnAxis(u.spinAxis, u.spinSpeed * dt);

  const groundOffset = u.groundOffset;
  if (obj.position.y > floorLevel + groundOffset) return false;

  obj.position.y = floorLevel + groundOffset;

  if (Math.abs(u.velocity.y) > 0.15 && u.bounceCount < MAX_BOUNCES) {
    // バウンド: 上下方向の速度を反転させつつ減衰
    u.velocity.y = -u.velocity.y * RESTITUTION;
    u.velocity.x *= 0.55;
    u.velocity.z *= 0.55;
    u.bounceCount++;
    u.spinSpeed *= 0.5;
    return false;
  }

  // 着地後は転がる動き（水平速度のみ摩擦で減衰）
  u.velocity.y = 0;
  u.velocity.x *= GROUND_FRICTION;
  u.velocity.z *= GROUND_FRICTION;
  u.spinSpeed *= GROUND_FRICTION;

  const horizSpeed = Math.hypot(u.velocity.x, u.velocity.z);
  if (horizSpeed < STOP_SPEED) {
    u.restTimer += dt;
    return u.restTimer > 0.3;
  } else {
    u.restTimer = 0;
    return false;
  }
}

function updateSticksAndCollisions(dt) {
  if (floorY === null) return;

  for (const s of sticks) {
    if (s.userData.settled) continue; // 静止済みの棒は物理演算しない（消えずに残る）

    s.userData.airborneTime += dt;
    const stopped = applyBouncePhysics(s, dt, floorY);
    if (stopped) settleStick(s);

    // ---- ピンとの当たり判定（静止前のみ・速度がある時のみ） ----
    if (!s.userData.settled) {
      for (const pin of pins) {
        if (pin.userData.knocked) continue;
        const pinHitPoint = pin.position.clone();
        pinHitPoint.y += 0.06;
        const d = s.position.distanceTo(pinHitPoint);
        if (d < PIN_RADIUS + 0.045) {
          const speed = s.userData.velocity.length();
          if (speed > KNOCK_SPEED_THRESHOLD) {
            knockPin(pin, s.userData.velocity);
            s.userData.knockedThisThrow.push(pin.userData.number);
          }
        }
      }
    }

    // 万一フィールド外に飛んでいきすぎた場合の保険（消すのではなくその場で静止扱い）
    if (s.position.y < floorY - 1.5) {
      s.position.y = floorY + 0.016;
      settleStick(s);
    }
  }

  // 弾かれたピンの物理（棒と同じバウンド処理を使い、自然な転がりにする）
  for (const pin of pins) {
    if (!pin.userData.knocked) continue;
    if (pin.userData.settled) continue;
    const stopped = applyBouncePhysics(pin, dt, floorY);
    if (stopped) settlePin(pin);
  }
}

function settlePin(pin) {
  pin.userData.settled = true;
  // 転がって止まった「その場所」を新しい立ち位置として記録する。
  // 次のターン開始時はここに直立させる（モルックは倒れた場所に立て直すのが醍醐味のため）。
  // 姿勢(baseQuaternion)は配置時の直立向きのまま変更しない。
  pin.userData.basePosition = pin.position.clone();
  pin.userData.basePosition.y = floorY; // 直立時の底面が地面に接するようYを正規化
}

function settleStick(stick) {
  if (stick.userData.settled) return;
  stick.userData.settled = true;
  if (!stick.userData.scored) {
    stick.userData.scored = true;
    finalizeThrow(stick.userData.knockedThisThrow);
  }
  // 棒はシーンから削除しない（地面に転がったまま残り続ける）
}

function knockPin(pin, velocity) {
  pin.userData.knocked = true; // そのターンが終わるまで倒れたまま（再度の当たり判定もしない）

  const fallAxis = new THREE.Vector3(velocity.z, 0, -velocity.x).normalize();
  if (fallAxis.lengthSq() === 0) fallAxis.set(1, 0, 0);

  // ピンを衝突方向に倒す（直立→横倒し）。以後は棒と同じ物理で転がっていく。
  pin.quaternion.premultiply(
    new THREE.Quaternion().setFromAxisAngle(fallAxis, Math.PI / 2)
  );
  // 横倒しになった分、中心の高さを胴体半径ぶん持ち上げる（地面にめり込まないように）
  pin.position.y += PIN_BODY_RADIUS;

  // 棒に弾かれた勢いを初速として与える（横方向は弾いた力、上方向は軽く跳ねる程度）
  pin.userData.velocity = new THREE.Vector3(
    velocity.x * 0.5,
    Math.abs(velocity.y) * 0.25 + 0.55,
    velocity.z * 0.5
  );
  pin.userData.gravity = -2.6;
  pin.userData.spinAxis = fallAxis;
  pin.userData.spinSpeed = 6; // 転がりの回転速度
  pin.userData.bounceCount = 0;
  pin.userData.restTimer = 0;
  pin.userData.groundOffset = PIN_BODY_RADIUS; // 横倒し状態での地面からの高さ
  pin.userData.settled = false;
}

// ---------- ターン管理 ----------
function updatePlayerCards() {
  p1ScoreEl.textContent = players[0].score;
  p2ScoreEl.textContent = players[1].score;
  p1CardEl.classList.toggle('active', currentPlayerIndex === 0 && !gameOver);
  p2CardEl.classList.toggle('active', currentPlayerIndex === 1 && !gameOver);
}

function beginTurn() {
  waitingForNextTurn = false;
  nextTurnBtn.style.display = 'none';
  angleControlEl.style.display = 'flex';

  // 前のターンで投げた棒をフィールドから片付ける
  clearSticks();

  // 前のターンで倒れたピンをその場で起こして直立に戻す
  standUpKnockedPins();

  turnBannerEl.style.display = 'block';
  const p = players[currentPlayerIndex];
  turnBannerEl.textContent = `${p.name}の番です。マーカーの位置に立って投げてください`;
  statusEl.textContent = '画面を上方向にフリックして棒を投げよう！';
  updatePlayerCards();
}

function standUpKnockedPins() {
  pins.forEach((pin) => {
    if (!pin.userData.knocked) return;
    pin.userData.knocked = false;
    pin.userData.settled = false;
    pin.userData.bounceCount = 0;
    pin.userData.restTimer = 0;
    pin.position.copy(pin.userData.basePosition);
    pin.quaternion.copy(pin.userData.baseQuaternion);
  });
}

function clearSticks() {
  sticks.forEach(s => scene.remove(s));
  sticks.length = 0;
}

// このターンで倒れたピン番号を蓄積（複数投擲分ではなく1投ごとに即時加点する）
function finalizeThrow(knockedNumbers) {
  if (gameOver || waitingForNextTurn) return;

  const player = players[currentPlayerIndex];

  if (!knockedNumbers || knockedNumbers.length === 0) {
    lastThrowEl.textContent = `${player.name}: 今回はピンに当たりませんでした`;
    promptNextTurn();
    return;
  }

  let points;
  if (knockedNumbers.length === 1) {
    points = knockedNumbers[0];
    lastThrowEl.textContent = `${player.name}: ${points}番ピンを倒した！ +${points}点`;
  } else {
    points = knockedNumbers.length;
    lastThrowEl.textContent = `${player.name}: ${knockedNumbers.length}本倒した！ +${points}点 (${knockedNumbers.join(', ')})`;
  }

  // ---- モルック公式スコアルール ----
  const newScore = player.score + points;
  if (newScore === 50) {
    player.score = 50;
    updatePlayerCards();
    gameOver = true;
    turnBannerEl.style.display = 'block';
    turnBannerEl.textContent = `🏆 ${player.name} の勝利！(50点ちょうど)`;
    statusEl.textContent = 'リセットボタンで新しいゲームを始められます';
    nextTurnBtn.style.display = 'none';
    return;
  } else if (newScore > 50) {
    player.score = 25; // 51点以上になったら25点に戻る
    lastThrowEl.textContent += '（51点を超えたため25点に戻ります）';
  } else {
    player.score = newScore;
  }

  updatePlayerCards();

  const remaining = pins.filter(p => !p.userData.knocked).length;
  if (remaining === 0) {
    lastThrowEl.textContent += '（全ピンが倒れました。次のターンで起こします）';
  }

  promptNextTurn();
}

function promptNextTurn() {
  waitingForNextTurn = true;
  statusEl.textContent = 'スコアを確認したら「次のターンへ」を押してください';
  nextTurnBtn.style.display = 'inline-block';
}

nextTurnBtn.addEventListener('click', () => {
  if (gameOver) return;
  currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
  beginTurn();
});

// ---------- リセット ----------
function resetGame() {
  pins.forEach(p => scene.remove(p));
  pins.length = 0;
  clearSticks();
  if (throwMarker) {
    scene.remove(throwMarker);
    throwMarker = null;
  }
  pinsPlaced = false;
  floorY = null;
  throwSpot = null;

  players[0].score = 0;
  players[1].score = 0;
  currentPlayerIndex = 0;
  gameOver = false;
  waitingForNextTurn = false;

  updatePlayerCards();
  lastThrowEl.textContent = '';
  turnBannerEl.style.display = 'none';
  nextTurnBtn.style.display = 'none';
  angleControlEl.style.display = 'none';
  statusEl.textContent = '床をタップ：その場所が立ち位置になり、2m先にピンが並びます';
}

// ---------- レンダーループ ----------
const clock = new THREE.Clock();

function render(timestamp, frame) {
  const dt = Math.min(clock.getDelta(), 0.05);

  if (frame) {
    const referenceSpace = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();

    if (!hitTestSourceRequested) {
      session.requestReferenceSpace('viewer').then((refSpace) => {
        session.requestHitTestSource({ space: refSpace }).then((source) => {
          hitTestSource = source;
        });
      });
      session.addEventListener('end', () => {
        hitTestSourceRequested = false;
        hitTestSource = null;
      });
      hitTestSourceRequested = true;
    }

    if (hitTestSource && !pinsPlaced) {
      const hitTestResults = frame.getHitTestResults(hitTestSource);
      if (hitTestResults.length > 0) {
        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
      } else {
        reticle.visible = false;
      }
    }
  }

  updateSticksAndCollisions(dt);
  updateThrowGuide();

  renderer.render(scene, camera);
}
</script>
